<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO-Q Remote Control</title>
<style>
  :root {
    --bg: #0d1117;
    --card-bg: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 24px;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 14px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
  }
  .card .label {
    color: var(--text-dim);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .card .value {
    font-size: 36px;
    font-weight: 700;
  }
  .card .detail {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 6px;
  }
  .bar-wrap {
    background: var(--bg);
    border-radius: 4px;
    height: 8px;
    margin-top: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .bar-fill.low    { background: var(--green); }
  .bar-fill.medium { background: var(--yellow); }
  .bar-fill.high   { background: var(--red); }
  .value.low    { color: var(--green); }
  .value.medium { color: var(--yellow); }
  .value.high   { color: var(--red); }
  .value.normal { color: var(--accent); }
  .footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 32px;
  }
  .error-banner {
    background: var(--red);
    color: white;
    text-align: center;
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🖥️ UNO-Q Remote Control</h1>
  <p class="subtitle">System Dashboard — auto-refreshes every 5 seconds</p>
</div>

<div class="error-banner" id="errorBanner">Connection lost — retrying...</div>

<div class="grid">
  <div class="card">
    <div class="label">CPU Usage</div>
    <div class="value" id="cpuValue">--</div>
    <div class="detail" id="cpuDetail">-- cores</div>
    <div class="bar-wrap"><div class="bar-fill" id="cpuBar" style="width:0%"></div></div>
  </div>

  <div class="card">
    <div class="label">Memory</div>
    <div class="value" id="memValue">--</div>
    <div class="detail" id="memDetail">-- / -- MB</div>
    <div class="bar-wrap"><div class="bar-fill" id="memBar" style="width:0%"></div></div>
  </div>

  <div class="card">
    <div class="label">Disk /</div>
    <div class="value" id="diskValue">--</div>
    <div class="detail" id="diskDetail">-- / -- GB</div>
    <div class="bar-wrap"><div class="bar-fill" id="diskBar" style="width:0%"></div></div>
  </div>

  <div class="card">
    <div class="label">Uptime</div>
    <div class="value normal" id="uptimeValue">--</div>
    <div class="detail" id="uptimeDetail">&nbsp;</div>
  </div>

  <div class="card" id="tempCard">
    <div class="label">Temperature</div>
    <div class="value normal" id="tempValue">--</div>
    <div class="detail">°C</div>
  </div>
</div>

<p class="footer" id="lastUpdate">Last update: --</p>

<script>
const API = '/api/status';

function levelClass(pct) {
  if (pct < 50) return 'low';
  if (pct < 80) return 'medium';
  return 'high';
}

async function refresh() {
  try {
    const resp = await fetch(API);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    document.getElementById('errorBanner').style.display = 'none';

    // CPU
    const cpu = data.cpu || {};
    const cpuPct = cpu.percent ?? 0;
    document.getElementById('cpuValue').textContent = cpuPct + '%';
    document.getElementById('cpuValue').className = 'value ' + levelClass(cpuPct);
    document.getElementById('cpuDetail').textContent = (data.cpu_cores || '?') + ' cores';
    document.getElementById('cpuBar').style.width = cpuPct + '%';
    document.getElementById('cpuBar').className = 'bar-fill ' + levelClass(cpuPct);

    // Memory
    const mem = data.memory || {};
    const memPct = mem.percent ?? 0;
    const usedMB = Math.round((mem.used_kb || 0) / 1024);
    const totalMB = Math.round((mem.total_kb || 0) / 1024);
    document.getElementById('memValue').textContent = memPct + '%';
    document.getElementById('memValue').className = 'value ' + levelClass(memPct);
    document.getElementById('memDetail').textContent = usedMB + ' / ' + totalMB + ' MB';
    document.getElementById('memBar').style.width = memPct + '%';
    document.getElementById('memBar').className = 'bar-fill ' + levelClass(memPct);

    // Disk
    const disk = data.disk || {};
    const diskPct = disk.percent ?? 0;
    document.getElementById('diskValue').textContent = diskPct + '%';
    document.getElementById('diskValue').className = 'value ' + levelClass(diskPct);
    document.getElementById('diskDetail').textContent =
      (disk.used_gb ?? '?') + ' / ' + (disk.total_gb ?? '?') + ' GB';
    document.getElementById('diskBar').style.width = diskPct + '%';
    document.getElementById('diskBar').className = 'bar-fill ' + levelClass(diskPct);

    // Uptime
    const uptime = data.uptime || {};
    document.getElementById('uptimeValue').textContent = uptime.formatted || '--';

    // Temperature
    const temp = data.temperature || {};
    if (temp.celsius != null) {
      document.getElementById('tempValue').textContent = temp.celsius;
      document.getElementById('tempCard').style.display = '';
    } else {
      document.getElementById('tempCard').style.display = 'none';
    }

    // Timestamp
    document.getElementById('lastUpdate').textContent =
      'Last update: ' + (data.timestamp_iso || '--');
  } catch (err) {
    console.error('Status fetch failed:', err);
    document.getElementById('errorBanner').style.display = 'block';
  }
}

// Initial load + auto-refresh every 5 seconds
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
